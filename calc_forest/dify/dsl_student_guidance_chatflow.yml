    - data:
        code: "def main(query: str) -> dict:\n    check_types = []\n    if any(w in\
          \ query for w in ['\\u52a0\\u6cd5', '\\u52a0', '+']):\n        check_types.append('\\\
          u9006\\u8fd0\\u7b97\\u51cf\\u6cd5\\u9a8c\\u7b97')\n    if any(w in query\
          \ for w in ['\\u51cf\\u6cd5', '\\u51cf', '-']):\n        check_types.append('\\\
          u9006\\u8fd0\\u7b97\\u52a0\\u6cd5\\u9a8c\\u7b97')\n    if any(w in query\
          \ for w in ['\\u4e58\\u6cd5', '\\u4e58', '\\u00d7']):\n        check_types.append('\\\
          u9006\\u8fd0\\u7b97\\u9664\\u6cd5\\u9a8c\\u7b97')\n    if any(w in query\
          \ for w in ['\\u9664\\u6cd5', '\\u9664', '\\u00f7']):\n        check_types.append('\\\
          u9006\\u8fd0\\u7b97\\u4e58\\u6cd5\\u9a8c\\u7b97')\n\n    if not check_types:\n\
          \        check_types = ['\\u9006\\u8fd0\\u7b97\\u6cd5', '\\u4f30\\u7b97\\\
          u6cd5', '\\u4ee3\\u5165\\u6cd5']\n\n    check_query = f'\\u9a8c\\u7b97\\\
          u65b9\\u6cd5 {\" \".join(check_types)} \\u68c0\\u9a8c\\u65b9\\u6cd5 \\u6559\\\
          u5b66\\u7b56\\u7565'\n\n    return {\n        'check_query': check_query,\n\
          \        'check_type': ', '.join(check_types),\n    }\n"
