    - data:
        code: "import re\n\ndef main(query: str) -> dict:\n    # Extract math expressions\
          \ (numbers, operators, fractions)\n    math_patterns = re.findall(r'[\\\
          d+\\-*/\\u00d7\\u00f7\\(\\)\\.=\\u5206\\u4e4b]+', query)\n    problem_hint\
          \ = ' '.join(math_patterns) if math_patterns else query[:100]\n\n    # Find\
          \ error codes mentioned explicitly\n    error_codes = re.findall(r'E\\d{2}',\
          \ query)\n\n    # Keyword-based error detection\n    keyword_map = {\n \
          \       '\\u9000\\u4f4d': 'E03', '\\u501f\\u4f4d': 'E03',\n        '\\u8fdb\\\
          u4f4d': 'E02',\n        '\\u5bf9\\u9f50': 'E04', '\\u6570\\u4f4d': 'E04',\n\
          \        '\\u5c0f\\u6570': 'E06', '\\u5206\\u6570': 'E06',\n        '\\\
          u987a\\u5e8f': 'E05', '\\u5148\\u7b97': 'E05',\n        '\\u6284\\u9519':\
          \ 'E07', '\\u6284\\u9898': 'E07',\n        '\\u5fd8': 'E08', '\\u6f0f':\
          \ 'E08', '\\u8df3\\u6b65': 'E08',\n    }\n\n    if not error_codes:\n  \
          \      found = []\n        for kw, code in keyword_map.items():\n      \
          \      if kw in query:\n                found.append(code)\n        error_codes\
          \ = list(set(found)) if found else ['E99']\n\n    error_keywords = ','.join(error_codes)\n\
          \n    # Determine guidance style based on error complexity\n    complex_errors\
          \ = {'E03', 'E04', 'E08'}\n    standard_errors = {'E01', 'E02', 'E06'}\n\
          \    found_codes = set(error_codes)\n    if found_codes & complex_errors:\n\
          \        guidance_style = 'exploration'\n    elif found_codes & standard_errors:\n\
          \        guidance_style = 'standard'\n    else:\n        guidance_style\
          \ = 'direct'\n\n    retrieval_query = f'{problem_hint} {error_keywords}\
          \ \\u9519\\u56e0 \\u6559\\u5b66\\u7b56\\u7565 \\u5f15\\u5bfc\\u65b9\\u6cd5'\n\
          \n    return {\n        'problem_hint': problem_hint[:200],\n        'error_keywords':\
          \ error_keywords,\n        'retrieval_query': retrieval_query,\n       \
          \ 'guidance_style': guidance_style,\n    }\n"
        code_language: python3
        desc: 解析学生输入，提取数学表达式、错因关键词，确定引导风格
