          logical_operator: and
        desc: mode包含"grading"走批改路径，否则走画像路径
        selected: false
        title: 模式路由
        type: if-else
      height: 126
      id: '1748000002'
      position:
        x: 380
        y: 400
      positionAbsolute:
        x: 380
        y: 400
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 260
    - data:
        code: "import json\n\ndef main(grading_results: str, student_info: str) ->\
          \ dict:\n    try:\n        data = json.loads(grading_results)\n    except:\n\
          \        data = []\n    items = []\n    if isinstance(data, list):\n   \
          \     items = data\n    elif isinstance(data, dict):\n        items = data.get('results',\
          \ [])\n    total = len(items)\n    error_count = 0\n    error_codes = []\n\
          \    for item in items:\n        if not isinstance(item, dict):\n      \
          \      continue\n        is_wrong = not item.get('correct', not item.get('is_correct',\
          \ True))\n        if is_wrong:\n            error_count += 1\n         \
          \   code = (\n                item.get('error_code')\n                or\
          \ item.get('diagnosis', {}).get('primary_error', {}).get('code', 'E99')\n\
          \                or 'E99'\n            )\n            error_codes.append(str(code))\n\
          \    unique_codes = sorted(set(error_codes)) if error_codes else ['E99']\n\
          \    try:\n        stu = json.loads(student_info)\n        stu_name = stu.get('name',\
          \ '同学')\n    except:\n        stu_name = '同学'\n    return {\n        'total':\
          \ str(total),\n        'error_count': str(error_count),\n        'error_codes':\
          \ ','.join(unique_codes),\n        'items_json': json.dumps(items, ensure_ascii=False),\n\
          \        'student_name': stu_name,\n    }\n"
        code_language: python3
        desc: 解析批改结果JSON，统计错误数量和错因编码
        outputs:
          total:
            children: null
            type: string
          error_count:
            children: null
            type: string
          error_codes:
            children: null
            type: string
          items_json:
            children: null
            type: string
          student_name:
            children: null
            type: string
        selected: false
        title: 解析批改数据
        type: code
        variables:
        - value_selector:
          - '1748000001'
          - grading_results
          variable: grading_results
        - value_selector:
          - '1748000001'
          - student_info
          variable: student_info
      height: 150
      id: '1748000003'
      position:
        x: 700
        y: 150
      positionAbsolute:
        x: 700
        y: 150
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 320
    - data:
        code: "import json\n\ndef main(items_json: str) -> dict:\n    try:\n     \
          \   items = json.loads(items_json)\n    except:\n        items = []\n  \
          \  wrong_list = []\n    for i, item in enumerate(items):\n        if not\
          \ isinstance(item, dict):\n            continue\n        is_wrong = not\
          \ item.get('correct', not item.get('is_correct', True))\n        if is_wrong:\n\
          \            problem = item.get('problem', f'第{i+1}题')\n            student_ans\
          \ = item.get('student_answer', '?')\n            correct_ans = item.get('correct_answer',\
          \ '?')\n            code = (\n                item.get('error_code')\n \
          \               or item.get('diagnosis', {}).get('primary_error', {}).get('code',\
          \ 'E99')\n                or 'E99'\n            )\n            wrong_list.append({\n\
          \                'index': i + 1,\n                'problem': str(problem),\n\
          \                'student_answer': str(student_ans),\n                'correct_answer':\
          \ str(correct_ans),\n                'error_code': str(code),\n        \
          \    })\n    summary_lines = []\n    for w in wrong_list:\n        summary_lines.append(\n\
          \            f\"第{w['index']}题: {w['problem']} 学生答:{w['student_answer']}\
          \ 正确:{w['correct_answer']} 错因:{w['error_code']}\"\n        )\n    return\
          \ {\n        'wrong_count': str(len(wrong_list)),\n        'error_list':\
          \ json.dumps(wrong_list, ensure_ascii=False),\n        'summary_text': '\\\
          n'.join(summary_lines) if summary_lines else '全部正确',\n    }\n"
        code_language: python3
        desc: 过滤错误答案，结构化错题列表
        outputs:
          wrong_count:
            children: null
            type: string
          error_list:
            children: null
            type: string
          summary_text:
            children: null
            type: string
        selected: false
        title: 提取错题列表
        type: code
        variables:
        - value_selector:
          - '1748000003'
          - items_json
          variable: items_json
      height: 150
      id: '1748000004'
      position:
        x: 1000
        y: 80
      positionAbsolute:
        x: 1000
        y: 80
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 320
    - data:
        desc: 将错题列表格式化为可读摘要
        selected: false
