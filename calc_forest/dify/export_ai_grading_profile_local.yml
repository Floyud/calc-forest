        desc: 结合知识库对批改结果进行语义分析
        model:
          completion_params:
            temperature: 0.7
            max_tokens: 2048
            top_p: 1
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: grading-system-prompt-v2
          role: system
          text: '你是一位小学数学批改分析助手。根据规则引擎的批改结果，进行语义层面的深入分析。


            结合知识库的错因分析和评语模板，完成以下分析要点：

            1. 错误根本原因分析（不是表面错误，而是背后的计算习惯或概念理解问题） 2. 计算习惯问题识别（如是否经常忘记退位、是否跳步等） 3. 知识点薄弱环节定位


            输出要求： - 中文JSON格式 - 包含 review_status: "pending_teacher_review" - 包含 analysis,
            habit_issues, weak_points, suggestion 字段 - 语气温暖鼓励，不贴标签

            '
        - id: grading-user-prompt-v2
          role: user
          text: '请分析以下批改数据：


            学生姓名：{{#1748000003.student_name#}}

            错因编码：{{#1748000003.error_codes#}}

            错题数量：{{#1748000003.error_count#}} / 总题数：{{#1748000003.total#}}


            错题明细：

            {{#1748000004.summary_text#}}


            知识库参考内容：

            {{#context#}}


            请结合知识库内容，输出详细的分析JSON。

            '
        selected: false
        title: 批改语义分析
        type: llm
        vision:
          enabled: false
      height: 98
      id: '1748000007'
      position:
        x: 1300
        y: 220
      positionAbsolute:
        x: 1300
        y: 220
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 280
    - data:
        code: "ENCOURAGEMENT_MAP = {\n    'E01': '基础计算还需要多练习哦，每一次练习都在变强！',\n    'E02':\
          \ '进位有点小失误，但你的计算思路是对的！再仔细一点就完美了。',\n    'E03': '退位计算确实有点难，你已经做得很棒了，继续加油！',\n\
          \    'E04': '注意对齐数位哦，你离正确答案只差一小步！',\n    'E05': '运算顺序需要再注意一下，你完全能掌握的！',\n\
          \    'E06': '小数和分数确实容易搞混，慢慢来，你会越来越熟练的。',\n    'E07': '抄题的时候再仔细看看哦，仔细是你的超能力！',\n\
          \    'E08': '计算步骤不要跳哦，每一步都是你思考的脚印。',\n    'E11': '做完题记得验算，养成好习惯，你会越来越厉害！',\n\
          \    'E99': '这道题有点特别，别担心，我们一起弄明白！',\n}\n\ndef main(error_codes: str, student_name:\
          \ str, error_count: str, total: str) -> dict:\n    codes = [c.strip() for\
          \ c in error_codes.split(',') if c.strip()]\n    messages = []\n    for\
          \ code in codes:\n        messages.append(ENCOURAGEMENT_MAP.get(code, ENCOURAGEMENT_MAP['E99']))\n\
          \    try:\n        ec = int(error_count)\n        tt = int(total)\n    \
          \    if ec == 0:\n            summary = f'{student_name}，全部答对了！太厉害了！继续保持！'\n\
          \        elif ec <= tt // 3:\n            summary = f'{student_name}，大部分都做对了，再接再厉！'\n\
          \        elif ec <= tt // 2:\n            summary = f'{student_name}，有一些小失误，但你在进步！'\n\
          \        else:\n            summary = f'{student_name}，这次有点难，但每次练习都是成长！'\n\
          \    except:\n        summary = f'{student_name}，继续加油！'\n    return {\n\
          \        'encouragements': '\\n'.join(messages),\n        'encouragement_summary':\
          \ summary,\n    }\n"
        code_language: python3
        desc: 根据错因编码映射温暖鼓励语，无需LLM
        outputs:
          encouragements:
            children: null
            type: string
          encouragement_summary:
            children: null
            type: string
        selected: false
        title: 生成鼓励语
        type: code
        variables:
        - value_selector:
          - '1748000003'
          - error_codes
          variable: error_codes
        - value_selector:
          - '1748000003'
          - student_name
          variable: student_name
        - value_selector:
          - '1748000003'
          - error_count
          variable: error_count
        - value_selector:
          - '1748000003'
          - total
          variable: total
      height: 150
      id: '1748000008'
      position:
        x: 1000
        y: 340
      positionAbsolute:
        x: 1000
        y: 340
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 320
    - data:
        desc: 汇聚三条并行分支的输出
        output_type: string
        selected: false
        title: 合并批改结果
        type: variable-aggregator
        variables:
        - - '1748000005'
          - output
        - - '1748000007'
          - text
        - - '1748000008'
          - encouragement_summary
        outputs:
          output:
            type: string
      height: 90
      id: '1748000009'
      position:
        x: 1600
        y: 200
      positionAbsolute:
        x: 1600
        y: 200
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 260
    - data:
        code: "import json\n\ndef main(\n    aggregated: str,\n    error_codes: str,\n\
          \    error_count: str,\n    total: str,\n    encouragements: str,\n    student_name:\
          \ str,\n) -> dict:\n    result = {\n        'mode': 'grading',\n       \
          \ 'student_name': student_name,\n        'error_codes': error_codes,\n \
          \       'total_errors': error_count,\n        'total_problems': total,\n\
          \        'encouragements': encouragements,\n        'aggregated_analysis':\
          \ aggregated,\n        'review_status': 'pending_teacher_review',\n    }\n\
          \    return {\n        'branch_output': json.dumps(result, ensure_ascii=False),\n\
          \        'error_codes': error_codes,\n        'total_errors': error_count,\n\
          \    }\n"
        code_language: python3
        desc: 将并行分析结果合并为统一批改JSON
        outputs:
          branch_output:
            children: null
            type: string
          error_codes:
            children: null
            type: string
          total_errors:
            children: null
            type: string
        selected: false
        title: 组装批改输出
        type: code
        variables:
        - value_selector:
          - '1748000009'
          - output
          variable: aggregated
        - value_selector:
          - '1748000003'
          - error_codes
          variable: error_codes
        - value_selector:
          - '1748000003'
          - error_count
          variable: error_count
        - value_selector:
          - '1748000003'
          - total
          variable: total
        - value_selector:
          - '1748000008'
          - encouragements
          variable: encouragements
        - value_selector:
          - '1748000003'
          - student_name
          variable: student_name
      height: 150
      id: '1748000010'
      position:
        x: 1900
        y: 200
      positionAbsolute:
        x: 1900
        y: 200
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 320
    - data:
        code: "import json\n\ndef main(error_stats: str, accuracy_trend: str, student_info:\
          \ str) -> dict:\n    try:\n        stats = json.loads(error_stats)\n   \
          \ except:\n        stats = {}\n    try:\n        trend = json.loads(accuracy_trend)\n\
          \    except:\n        trend = []\n    try:\n        stu = json.loads(student_info)\n\
          \        stu_name = stu.get('name', '同学')\n        grade = stu.get('grade',\
          \ '未知')\n    except:\n        stu_name = '同学'\n        grade = '未知'\n  \
          \  if isinstance(stats, dict):\n        top_errors = sorted(stats.items(),\
          \ key=lambda x: x[1], reverse=True)[:5]\n    else:\n        top_errors =\
          \ []\n    top_error_str = ','.join([str(e[0]) for e in top_errors]) if top_errors\
          \ else 'E99'\n    if isinstance(trend, list) and trend:\n        latest_acc\
          \ = trend[-1]\n        if len(trend) >= 2:\n            prev_acc = trend[-2]\n\
          \        else:\n            prev_acc = latest_acc\n    else:\n        latest_acc\
          \ = 0\n        prev_acc = 0\n    return {\n        'top_errors': top_error_str,\n\
          \        'latest_accuracy': str(latest_acc),\n        'prev_accuracy': str(prev_acc),\n\
          \        'student_name': stu_name,\n        'grade': str(grade),\n     \
          \   'stats_json': json.dumps(stats, ensure_ascii=False),\n        'trend_json':\
          \ json.dumps(trend, ensure_ascii=False),\n        'retrieval_query': f'学生画像\
          \ {top_error_str} 学习风格 成长叙事 能力评估',\n    }\n"
        code_language: python3
        desc: 解析错因统计和正确率趋势，准备画像数据
        outputs:
          top_errors:
            children: null
            type: string
          latest_accuracy:
            children: null
            type: string
          prev_accuracy:
            children: null
            type: string
          student_name:
            children: null
            type: string
          grade:
            children: null
            type: string
          stats_json:
            children: null
            type: string
          trend_json:
            children: null
            type: string
          retrieval_query:
            children: null
            type: string
        selected: false
        title: 解析画像数据
        type: code
        variables:
        - value_selector:
          - '1748000001'
          - error_stats
          variable: error_stats
        - value_selector:
          - '1748000001'
          - accuracy_trend
          variable: accuracy_trend
        - value_selector:
          - '1748000001'
          - student_info
          variable: student_info
      height: 150
      id: '1748000011'
      position:
        x: 700
        y: 550
      positionAbsolute:
        x: 700
        y: 550
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 320
    - data:
        desc: 检索画像相关知识（学生画像、成长体系、能力维度）
        dataset_ids:
        - 8a588b72-2c02-4d34-b9ef-4f53dee606b0
        retrieval_mode: single
        single_retrieval_config:
          model:
            provider: langgenius/deepseek/deepseek
            name: deepseek-chat
            mode: chat
        selected: false
        title: 画像知识检索
        type: knowledge-retrieval
        query_variable_selector:
        - '1748000011'
