      targetPosition: left
      type: custom
      width: 280
    - data:
        context:
          enabled: true
          variable_selector:
          - '1748000012'
          - result
        desc: 基于历史数据生成学生能力画像，四个维度
        model:
          completion_params:
            temperature: 0.7
            max_tokens: 2048
            top_p: 1
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: ability-system-prompt-v2
          role: system
          text: '你是一位学习分析专家。基于学生的历史错因统计和正确率趋势，生成学生能力画像。


            分析维度： 1. 计算准确率 — 整体和各错因类别的准确率 2. 运算速度 — 基于题目完成情况推断 3. 知识点掌握 — 各知识点的掌握程度
            4. 学习态度 — 从练习频率和进步趋势推断


            结合知识库的学生画像和成长体系内容。


            输出要求： - 中文JSON格式 - 包含 review_status: "pending_teacher_review" - 包含 dimensions,
            overall_assessment, strengths, areas_for_improvement 字段 - 不贴标签，关注可改进行动

            '
        - id: ability-user-prompt-v2
          role: user
          text: '请为以下学生生成能力画像：


            学生姓名：{{#1748000011.student_name#}}

            年级：{{#1748000011.grade#}}

            高频错因：{{#1748000011.top_errors#}}

            最近正确率：{{#1748000011.latest_accuracy#}}


            错因统计：

            {{#1748000011.stats_json#}}


            正确率趋势：

            {{#1748000011.trend_json#}}


            知识库参考内容：

            {{#context#}}


            请结合知识库内容，输出详细的能力维度分析JSON。

            '
        selected: false
        title: 能力维度分析
        type: llm
        vision:
          enabled: false
      height: 98
      id: '1748000013'
      position:
        x: 1300
        y: 480
      positionAbsolute:
        x: 1300
        y: 480
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 280
    - data:
        code: "import json\n\ndef main(latest_accuracy: str, prev_accuracy: str, trend_json:\
          \ str) -> dict:\n    try:\n        latest = float(latest_accuracy)\n   \
          \     prev = float(prev_accuracy)\n    except:\n        latest = 0.0\n \
          \       prev = 0.0\n    change = latest - prev\n    if change > 0.05:\n\
          \        direction = '上升'\n        emoji = '[UP]'\n    elif change < -0.05:\n\
          \        direction = '下降'\n        emoji = '[DOWN]'\n    else:\n       \
          \ direction = '稳定'\n        emoji = '[STABLE]'\n    try:\n        growth_rate\
          \ = round(abs(change) / max(prev, 0.01) * 100, 1)\n    except:\n       \
          \ growth_rate = 0.0\n    try:\n        trend = json.loads(trend_json)\n\
          \        if isinstance(trend, list) and len(trend) >= 3:\n            recent_trend\
          \ = trend[-3:]\n            trend_desc = f'近3次正确率: {recent_trend}'\n   \
          \     elif isinstance(trend, list) and trend:\n            trend_desc =\
          \ f'全部正确率: {trend}'\n        else:\n            trend_desc = '暂无趋势数据'\n\
          \    except:\n        trend_desc = '暂无趋势数据'\n    return {\n        'direction':\
          \ direction,\n        'change': '+' + str(round(change, 2)) if change >=\
          \ 0 else str(round(change, 2)),\n        'growth_rate': str(growth_rate)\
          \ + '%',\n        'latest_accuracy': str(round(latest, 2)),\n        'trend_description':\
          \ trend_desc,\n        'emoji': emoji,\n    }\n"
