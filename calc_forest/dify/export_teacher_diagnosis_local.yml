workflow:
  graph:
    nodes:
    - data:
        desc: 接收诊断结果、学生信息和会话历史
        selected: false
        title: Start
        type: start
        variables:
        - label: 诊断结果
          max_length: null
          options: []
          required: true
          type: text-input
          variable: diagnosis
        - label: 学生信息
          max_length: null
          options: []
          required: true
          type: text-input
          variable: student_info
        - label: 会话历史
          max_length: null
          options: []
          required: false
          type: text-input
          variable: session_history
      height: 187
      id: '1747000001'
      position:
        x: 80
        y: 300
      positionAbsolute:
        x: 80
        y: 300
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\nimport re\n\ndef main(diagnosis: str, student_info: str)\
          \ -> dict:\n    code = ''\n    confidence = 0.5\n    problem_summary = ''\n\
          \    try:\n        diag = json.loads(diagnosis)\n        if isinstance(diag,\
          \ dict):\n            code = diag.get('primary_error', {}).get('code', '')\n\
          \            confidence = diag.get('primary_error', {}).get('confidence',\
          \ 0.5)\n            problem_summary = diag.get('problem', '') or diag.get('problem_summary',\
          \ '')\n    except Exception:\n        pass\n    if not code:\n        codes\
          \ = re.findall(r'E\\d{2}', diagnosis)\n        code = codes[0] if codes\
          \ else 'E99'\n    critical = ['E03', 'E04', 'E08']\n    moderate = ['E01',\
          \ 'E02', 'E06']\n    if code in critical:\n        severity_level = 'critical'\n\
          \    elif code in moderate:\n        severity_level = 'moderate'\n    else:\n\
          \        severity_level = 'minor'\n    return {\n        'error_code': code,\n\
          \        'severity_level': severity_level,\n        'confidence': str(confidence),\n\
          \        'problem_summary': problem_summary or diagnosis[:200],\n      \
          \  'student_summary': student_info[:200],\n        'retrieval_query': f'错因{code}\
          \ 教学策略 错误分析方法 引导练习',\n    }\n"
        code_language: python3
        desc: 解析JSON诊断数据，提取错因代码、置信度、严重度等级
        outputs:
          error_code:
            children: null
            type: string
          severity_level:
            children: null
            type: string
          confidence:
            children: null
            type: string
          problem_summary:
            children: null
            type: string
          student_summary:
            children: null
            type: string
          retrieval_query:
            children: null
            type: string
        selected: false
        title: 解析诊断数据
        type: code
        variables:
        - value_selector:
          - '1747000001'
          - diagnosis
          variable: diagnosis
        - value_selector:
          - '1747000001'
          - student_info
          variable: student_info
      height: 94
