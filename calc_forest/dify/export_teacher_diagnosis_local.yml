    - data:
        code: "import re\n\ndef main(formatted_report: str, error_code: str, severity_level:\
          \ str) -> dict:\n    teacher_summary = formatted_report.strip() if formatted_report\
          \ else ''\n    error_analysis = ''\n    recommendation = ''\n\n    m_err\
          \ = re.search(r'【错误分析】(.*?)(?=【|$)', teacher_summary, re.DOTALL)\n    if\
          \ m_err:\n        error_analysis = m_err.group(1).strip()\n\n    m_rec =\
          \ re.search(r'【(教学建议|干预策略|教师建议|练习推荐)】(.*?)(?=【|$)', teacher_summary, re.DOTALL)\n\
          \    if m_rec:\n        recommendation = m_rec.group(2).strip()\n\n    if\
          \ not error_analysis and not recommendation:\n        error_analysis = teacher_summary\n\
          \        recommendation = f'建议针对错因{error_code}进行专项练习'\n\n    return {\n\
          \        'teacher_summary': teacher_summary,\n        'error_analysis':\
          \ error_analysis,\n        'recommendation': recommendation,\n        'severity_level':\
          \ severity_level,\n    }\n"
        code_language: python3
