    - data:
        code: "ERROR_INFO = {\n    'E05': ('运算顺序错误', '提醒学生注意运算优先级：先乘除后加减，有括号先算括号。建议用标注法标记运算步骤。'),\n\
          \    'E07': ('抄题/转写错误', '建议训练学生抄写后立即比对检查，养成\"抄完看一遍\"的习惯。'),\n    'E09':\
          \ ('符号混淆', '使用对比练习，帮助学生区分易混淆的运算符号。'),\n    'E10': ('计算策略错误', '引导学生掌握基本的凑整、拆分等计算策略。'),\n\
          \    'E11': ('未验算', '培养验算习惯，建议每次计算后用逆运算或估算法检查。'),\n}\n\ndef main(error_code:\
          \ str, problem_summary: str, knowledge_result: str) -> dict:\n    info =\
          \ ERROR_INFO.get(error_code, ('轻微计算错误', '建议通过针对性练习巩固基础计算能力。'))\n    kb_ref\
          \ = knowledge_result[:300] if knowledge_result else '无'\n    return {\n\
          \        'result': f'【{info[0]}】{info[1]}\\n知识库参考：{kb_ref}\\n问题摘要：{problem_summary}',\n\
          \        'analysis_type': 'minor',\n    }\n"
        code_language: python3
        desc: 针对轻微错误生成简要建议（不调用LLM，节省计算资源）
