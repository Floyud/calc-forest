          \ '一般')\n    query = f'错因{error_code} {label}错误 教学策略 班级干预方法 学生引导'\n    if\
          \ student_summary:\n        query += f' {student_summary[:50]}'\n    return\
          \ {\n        'strategy_query': query,\n        'severity_label': label,\n\
          \    }\n"
        code_language: python3
