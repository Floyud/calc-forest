    - data:
        code: |
          import json

          def main(response_json: str) -> dict:
              diagnosis = json.loads(response_json)
              confidence = float(diagnosis.get('primary_error', {}).get('confidence', 0.0))
              route = 'high_confidence' if confidence >= 0.65 else 'low_confidence'
              return {
                  'diagnosis': diagnosis,
                  'primary_error_code': diagnosis.get('primary_error', {}).get('code', 'E99'),
                  'confidence': confidence,
                  'route': route,
                  'teacher_summary': diagnosis.get('teacher_summary', ''),
                  'student_feedback_hint': diagnosis.get('primary_error', {}).get('student_feedback', ''),
              }
        code_language: python3
        desc: 'Parse diagnosis response and compute routing fields.'
        outputs:
          diagnosis:
            children: null
            type: object
          primary_error_code:
            children: null
            type: string
          confidence:
            children: null
            type: number
          route:
            children: null
            type: string
          teacher_summary:
            children: null
            type: string
          student_feedback_hint:
            children: null
            type: string
        selected: false
        title: Parse Diagnosis
