    - data:
        code: |
          import json

          QUESTION_BANK = {
              'E01': ['这一步对应的是哪句口诀或哪组基础算式？', '你能先把这一小步单独算一遍吗？'],
              'E02': ['哪一位相加超过了 9？', '满十以后，你有没有把进的 1 写到前一位？'],
              'E03': ['哪一位不够减，需要先借 1？', '借位以后，前一位有没有少 1？'],
              'E04': ['个位、十位、百位有没有对齐？', '每一列现在分别表示什么数位？'],
              'E05': ['这道题第一步应该先算哪里？', '你能先把最先算的部分圈出来吗？'],
              'E07': ['你抄下来的数字和原题里的数字一样吗？', '符号有没有看错或写错？'],
              'E08': ['你是不是只算到了一部分？', '还少哪一步没有写出来或合起来？'],
              'E11': ['算完以后，这个答案看起来合理吗？', '你能用估算或逆运算再检查一次吗？'],
          }

          def _pick_tree(trees, tree_species_id):
              if not tree_species_id:
                  return None
              for item in trees:
                  if item.get('id') == tree_species_id:
                      return item
              return None

          def _pick_encouragement(rules):
              for rule in rules:
                  if rule.get('trigger') == 'practice_completed':
                      return rule.get('message')
              return ''

          def main(diagnosis_json: dict, practice_json: str, tree_list_json: str, encouragements_json: str, tree_species_id: str = '') -> dict:
              practice = json.loads(practice_json)
              trees = json.loads(tree_list_json)
              encouragements = json.loads(encouragements_json)
              code = diagnosis_json.get('primary_error', {}).get('code', 'E99')
              hint = diagnosis_json.get('primary_error', {}).get('student_feedback', '')
              questions = QUESTION_BANK.get(code, ['你能把中间步骤再写出来吗？', '你觉得是从哪一步开始不确定的？'])
              encouragement_message = _pick_encouragement(encouragements)
              tree = _pick_tree(trees, tree_species_id)
              items = practice.get('items', [])
              student_message = '没关系，我们一步一步来。' + hint
              teacher_summary = diagnosis_json.get('teacher_summary', '')
              if items:
                  teacher_summary += f" 建议先使用 {practice.get('estimated_minutes', 5)} 分钟以内的 {len(items)} 道短练习。"
              session_data = {
                  'diagnosis': diagnosis_json,
                  'practice': practice,
                  'teacher_summary': teacher_summary,
                  'student_feedback': {
                      'message': student_message,
                      'guiding_questions': questions[:2],
                      'key_takeaway': hint,
                      'next_step': f'先把关键一步想清楚，再完成这 {len(items)} 道短练习。',
                  },
                  'tree_species': tree,
                  'encouragement_message': encouragement_message,
                  'review_status': 'pending_teacher_review',
              }
              return {
                  'session_data': session_data,
                  'teacher_summary': teacher_summary,
                  'diagnosis_code': code,
                  'student_message': student_message,
                  'encouragement_message': encouragement_message,
              }
        code_language: python3
        desc: 'Assemble the final high-confidence teacher-facing payload.'
        outputs:
          session_data:
            children: null
            type: object
          teacher_summary:
            children: null
            type: string
          diagnosis_code:
            children: null
            type: string
          student_message:
            children: null
            type: string
          encouragement_message:
            children: null
            type: string
        selected: false
        title: Assemble High Confidence
        type: code
        variables:
        - value_selector:
          - parse_diagnosis
          - diagnosis
          variable: diagnosis_json
        - value_selector:
          - practice_http
          - body
          variable: practice_json
        - value_selector:
          - tree_http
          - body
          variable: tree_list_json
        - value_selector:
          - encouragements_http
          - body
          variable: encouragements_json
        - value_selector:
          - start_node
          - tree_species_id
          variable: tree_species_id
      height: 220
      id: 'assemble_high_confidence'
