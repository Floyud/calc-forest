      id: parse-to-route
      source: 'parse_diagnosis'
      sourceHandle: source
      target: 'route_confidence'
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: code
      id: route-true-to-build-practice
      source: 'route_confidence'
      sourceHandle: 'true'
      target: 'build_practice_request'
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: if-else
        targetType: code
      id: route-false-to-assemble-low
      source: 'route_confidence'
      sourceHandle: 'false'
      target: 'assemble_low_confidence'
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
