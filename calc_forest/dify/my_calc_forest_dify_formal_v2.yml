              payload = {
                  'student_id': student_id,
                  'grade': int(grade),
                  'problem': problem_text,
                  'correct_answer': str(correct_answer_text),
                  'student_answer': str(student_answer_text),
                  'student_steps': [line.strip() for line in student_steps_text.splitlines() if line.strip()],
                  'source': 'manual',
              }
              return {'request_json': json.dumps(payload, ensure_ascii=False)}
