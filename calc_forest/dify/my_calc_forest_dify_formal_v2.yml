    - data:
        code: |
          QUESTION_BANK = {
              'E01': ['这一步对应的是哪句口诀或哪组基础算式？', '你能先把这一小步单独算一遍吗？'],
              'E02': ['哪一位相加超过了 9？', '满十以后，你有没有把进的 1 写到前一位？'],
              'E03': ['哪一位不够减，需要先借 1？', '借位以后，前一位有没有少 1？'],
              'E04': ['个位、十位、百位有没有对齐？', '每一列现在分别表示什么数位？'],
              'E05': ['这道题第一步应该先算哪里？', '你能先把最先算的部分圈出来吗？'],
              'E07': ['你抄下来的数字和原题里的数字一样吗？', '符号有没有看错或写错？'],
              'E08': ['你是不是只算到了一部分？', '还少哪一步没有写出来或合起来？'],
              'E11': ['算完以后，这个答案看起来合理吗？', '你能用估算或逆运算再检查一次吗？'],
          }

          def main(diagnosis_json: dict) -> dict:
              code = diagnosis_json.get('primary_error', {}).get('code', 'E99')
              hint = diagnosis_json.get('primary_error', {}).get('student_feedback', '')
              questions = QUESTION_BANK.get(code, ['你能把中间步骤再写出来吗？', '你觉得是从哪一步开始不确定的？'])
              teacher_summary = diagnosis_json.get('teacher_summary', '') + ' 当前证据还不够稳定，建议先追问或补步骤，再决定练习。'
              session_data = {
                  'diagnosis': diagnosis_json,
                  'practice': None,
                  'teacher_summary': teacher_summary,
                  'student_feedback': {
                      'message': '我们先不急着往下做，先把关键一步想清楚。' + hint,
                      'guiding_questions': questions[:2],
                      'key_takeaway': hint,
                      'next_step': '请先补写关键步骤或回答追问。',
                  },
                  'tree_species': None,
                  'encouragement_message': '',
                  'review_status': 'pending_teacher_review',
                  'clarify_required': True,
              }
              return {
                  'session_data': session_data,
                  'teacher_summary': teacher_summary,
                  'diagnosis_code': code,
                  'student_message': session_data['student_feedback']['message'],
                  'encouragement_message': '',
              }
        code_language: python3
        desc: 'Build a conservative clarify-first response when confidence is low.'
        outputs:
          session_data:
            children: null
            type: object
          teacher_summary:
            children: null
            type: string
          diagnosis_code:
            children: null
            type: string
          student_message:
            children: null
            type: string
          encouragement_message:
            children: null
            type: string
        selected: false
        title: Assemble Low Confidence
        type: code
