        isInIteration: false
        isInLoop: false
        sourceType: start
        targetType: code
      id: start-to-build-diagnose
      source: 'start_node'
      sourceHandle: source
      target: 'build_diagnose_request'
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: code
        targetType: http-request
