name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-playwright
          playwright install chromium
      - name: Seed database
        run: PYTHONPATH=. python scripts/seed_data.py
      - name: Seed curriculum
        run: PYTHONPATH=. python scripts/seed_curriculum.py
      - name: Run unit tests
        run: |
          PYTHONPATH=. python -m pytest -s tests/ -q --tb=short \
            --ignore=tests/test_dify_e2e.py \
            --ignore=tests/test_e2e_smoke.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: calc_forest/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: calc_forest/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npx next build --no-lint
